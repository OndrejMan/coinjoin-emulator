name: Build and Push joinmarket-client-server to GHCR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "containers/joinmarket-client-server/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ADDED: Convert the repository owner to lowercase using bash parameter expansion
      - name: Set lowercase repository owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone upstream joinmarket-clientserver
        run: |
          git clone --depth 1 https://github.com/JoinMarket-Org/joinmarket-clientserver.git /tmp/joinmarket-clientserver

      - name: Build joinmarket-test base image
        run: |
          docker build -t joinmarket-test /tmp/joinmarket-clientserver

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_OWNER }}/joinmarket-client-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./containers/joinmarket-client-server
          push: true
          # Single platform only — joinmarket-test base image may not support arm64
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
