name: Build and Push joinmarket-client-server to GHCR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "containers/joinmarket-client-server/**"
      - ".github/workflows/joinmarket-client-server.yaml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase repository owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone upstream joinmarket-clientserver
        run: |
          JOINMARKET_CLIENTSERVER_DIR="$(mktemp -d "${RUNNER_TEMP:-/tmp}/joinmarket-clientserver.XXXXXX")"
          git clone --depth 1 https://github.com/JoinMarket-Org/joinmarket-clientserver.git "$JOINMARKET_CLIENTSERVER_DIR"
          echo "JOINMARKET_CLIENTSERVER_DIR=$JOINMARKET_CLIENTSERVER_DIR" >> "$GITHUB_ENV"

      - name: Build and push joinmarket-test base image
        run: |
          docker build -t ghcr.io/${{ env.REPO_OWNER }}/joinmarket-test:latest "$JOINMARKET_CLIENTSERVER_DIR"
          docker push ghcr.io/${{ env.REPO_OWNER }}/joinmarket-test:latest

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_OWNER }}/joinmarket-client-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./containers/joinmarket-client-server
          push: true
          platforms: linux/amd64
          build-args: |
            JOINMARKET_TEST_IMAGE=ghcr.io/${{ env.REPO_OWNER }}/joinmarket-test:latest
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
