name: Build and Push wasabi-backend to GHCR

on:
	push:
		branches:
			- main
		paths:
			- "containers/wasabi-backend/**"

permissions:
	contents: read
	packages: write

jobs:
	list-backend-versions:
		runs-on: self-hosted
		steps:
			- name: Checkout repository
				uses: actions/checkout@v4
			- name: List backend versions
				id: list-versions
				run: |
					cd containers/wasabi-backend
					VERSIONS_JSON=$(printf '%s\n' */ | cut -f1 -d'/' | sort -V | awk 'BEGIN { printf "[" } { printf "%s\"%s\"", sep, $0; sep = "," } END { print "]" }')
					echo "versions=$VERSIONS_JSON" >> "$GITHUB_OUTPUT"
		outputs:
			versions: ${{ steps.list-versions.outputs.versions }}

	build-and-push:
		needs: list-backend-versions
		runs-on: self-hosted
		strategy:
			fail-fast: false
			matrix:
				version: ${{ fromJson(needs.list-backend-versions.outputs.versions) }}
		steps:
			- name: Checkout repository
				uses: actions/checkout@v4
			- name: Set up QEMU
				uses: docker/setup-qemu-action@v3
			- name: Set up Docker Buildx
				uses: docker/setup-buildx-action@v3
			- name: Log in to the Container registry
				uses: docker/login-action@v3
				with:
					registry: ghcr.io
					username: ${{ github.actor }}
					password: ${{ secrets.GITHUB_TOKEN }}
			- name: Build and push
				uses: docker/build-push-action@v5
				with:
					context: ./containers/wasabi-backend/${{ matrix.version }}
					push: true
					platforms: linux/amd64,linux/arm64
					tags: ghcr.io/${{ github.repository_owner }}/wasabi-backend:${{ matrix.version }}
