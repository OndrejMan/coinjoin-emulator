name: Build and Push to GHCR

# Trigger the workflow when code is pushed to the main branch
on:
  push:
    branches:
      - main 

# CRITICAL: Grant the workflow permission to read the repo and write to GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Add this step to install and initialize Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # This token is automatically provided by GitHub Actions
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Defines the base image name: ghcr.io/your-username/your-repo
          images: ghcr.io/${{ github.repository }}
          # Generates tags based on branch name, tags, or commit SHA
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}